<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;700&display=swap"
  rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <title>Plants</title>
</head>
<body>
  <header class="header">
    <div class="container _container">
      <div class="header__top">
        <div class="header__inner">
          <a class="header__logo" href="#">
            <img class="header__images" src="images/icons1/logo.svg" alt="logo">
          </a>
          <nav class="menu">
            <ul class="menu__list">
              <li class="menu__item">
                <a class="menu__link" href="#">Home</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="#">About us</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="#">Service</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="#">Price</a>
              </li>
              <li class="menu__item">
                <a class="menu__link" href="#">Contacts</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
      <section class="welcome">
        <div class="welcome__inner">
          <img class="welcome__img" src="images/leafs.png" alt="img">
          <div class="welcome__content">
            <h1 class="welcome__title">
              We grow <span>plants</span> and give you oxygen
            </h1>
            <p class="welcome__text">
              Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard
              dummy text ever since the 1500s.
            </p>
            <button class="welcome__btn">
              LEARN MORE
            </button>
          </div>
        </div>
      </section>
    </div>
  </header>

  <script src="js/main.js"></script>
</body>
</html>
